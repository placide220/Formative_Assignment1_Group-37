name: alu_connect
description: ALU Connect — Student engagement and community platform for African Leadership University.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Local persistence
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3

  # UI
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3

  # Media
  image_picker: ^1.0.4

  # Charts
  fl_chart: ^0.66.0

  # Utilities
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
